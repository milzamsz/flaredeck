name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (universal)
            os: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin
          - label: Linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - label: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Verify release contract
        run: npm run release:verify

      - name: Verify tag matches packaged version
        shell: bash
        run: |
          set -euo pipefail
          expected="v$(node -p "require('./package.json').version")"
          actual="${{ github.event.inputs.tag || github.ref_name }}"
          test "$actual" = "$expected"

      - name: Build version-matched companions
        run: node scripts/prepare-sidecars.mjs ${{ matrix.target }}

      - name: Smoke companion binaries
        run: node scripts/smoke-sidecars.mjs ${{ matrix.target }}

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'FlareDeck ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            See the [download page](https://www.flaredeck.dev/download) for installers.

            This release installs the desktop, CLI, MCP server, and webhook proxy as one version-matched unit. Signed updater bundles and SHA-256 checksums are attached below.

            See `docs/implementation/NEXT-RELEASE-NOTES.md` in the tagged source for feature, migration, rollback, and known-platform notes.
          releaseDraft: true
          prerelease: false
          args: --config src-tauri/tauri.release.conf.json ${{ matrix.args }}

  manifest:
    name: Update latest.json on flaredeck-web
    # Fail closed: the draft is published only after every supported target
    # built and smoked the same desktop/companion version.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Fetch updater manifest assets from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p artifacts
          # tauri-action uploads a `latest.json` per platform AS WELL AS
          # the *.sig signature files. We download all three platform
          # manifests and merge them into a single `latest.json`.
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'latest*.json' \
            --dir artifacts \
            || true
          ls -la artifacts

      - name: Merge per-platform manifests
        id: merge
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const files = fs.readdirSync("artifacts").filter(f => f.endsWith(".json"));
            if (files.length === 0) {
              console.log("No platform manifests found in artifacts/. Skipping latest.json update.");
              process.exit(0);
            }
            const merged = { version: "", notes: "", pub_date: new Date().toISOString(), platforms: {} };
            for (const f of files) {
              const data = JSON.parse(fs.readFileSync(path.join("artifacts", f), "utf8"));
              if (!merged.version) merged.version = data.version;
              if (!merged.notes && data.notes) merged.notes = data.notes;
              if (data.pub_date) merged.pub_date = data.pub_date;
              if (data.platforms) Object.assign(merged.platforms, data.platforms);
            }
            if (Object.keys(merged.platforms).length === 0) {
              console.log("Merged manifest has no platforms. Skipping latest.json update.");
              process.exit(0);
            }
            fs.writeFileSync("latest.json", JSON.stringify(merged, null, 2));
            console.log(JSON.stringify(merged, null, 2));
          '
          if [ -f latest.json ]; then
            echo "has_manifest=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_manifest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and upload release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir release-assets
          find release-assets -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 -r sha256sum \
            | sed 's#release-assets/##' > SHA256SUMS.txt
          test -s SHA256SUMS.txt
          gh release upload "${{ steps.tag.outputs.tag }}" SHA256SUMS.txt \
            --repo "${{ github.repository }}" --clobber

      - name: Checkout flaredeck-web
        if: steps.merge.outputs.has_manifest == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.WEB_REPO }}        # e.g. milzamsz/flaredeck-dev
          token: ${{ secrets.WEB_REPO_PAT }}         # PAT with `contents:write` on the web repo
          path: web

      - name: Copy latest.json into the web repo
        if: steps.merge.outputs.has_manifest == 'true'
        run: |
          set -e
          mkdir -p web/apps/website/public
          cp latest.json web/apps/website/public/latest.json

      - name: Commit and push
        if: steps.merge.outputs.has_manifest == 'true'
        working-directory: web
        run: |
          set -e
          git config user.name "flaredeck-releaser"
          git config user.email "releaser@flaredeck.dev"
          if git diff --quiet apps/website/public/latest.json; then
            echo "No change to latest.json — skipping commit."
            exit 0
          fi
          git add apps/website/public/latest.json
          git commit -m "release: update latest.json for ${{ steps.tag.outputs.tag }}"
          git push

      - name: Publish verified draft
        if: steps.merge.outputs.has_manifest == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.tag.outputs.tag }}" --repo "${{ github.repository }}" --draft=false
